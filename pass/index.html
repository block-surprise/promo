<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強力パスワード生成 | 安全・無料の作成ツール</title>
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3571574988222927"
     crossorigin="anonymous"></script>
        <link rel="icon" href="https://blocksurprise.f5.si/IMG_3967.png">
    <link rel="apple-touch-icon" href="https://blocksurprise.f5.si/IMG_3967.png">
    <meta name="google-site-verification" content="QzpufK8Cl_B7crFUTFlAgQPzxa3RfE3NILhwN_26cwk" />
<meta name="google-adsense-account" content="ca-pub-3571574988222927">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #10b981; /* 安心感のある緑 */
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; color: #065f46; }

        .pass-display {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #e5e7eb;
            min-height: 1.5em;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.copy-btn { background-color: #6b7280; }

        .article-space {
            max-width: 400px;
            margin-top: 30px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>パスワード生成器</h1>
    
    <div class="pass-display" id="passwordOutput">********</div>

    <div class="setting-group">
        <div class="setting-item">
            <span>長さ: <span id="lengthVal">12</span></span>
            <input type="range" id="length" min="6" max="32" value="12" oninput="document.getElementById('lengthVal').innerText=this.value">
        </div>
        <div class="setting-item">
            <label><input type="checkbox" id="includeUpper" checked> 英大文字</label>
            <label><input type="checkbox" id="includeNumbers" checked> 数字</label>
            <label><input type="checkbox" id="includeSymbols"> 記号</label>
        </div>
    </div>

    <button onclick="generatePassword()">新しいパスワードを作成</button>
    <button class="copy-btn" onclick="copyPassword()">コピーする</button>
</div>

<div class="article-space">
    <hr>
    <h3>安全なパスワードの作り方</h3>
    <p>
        セキュリティを強化するためには、推測されにくい「英大文字・小文字・数字・記号」を組み合わせた12文字以上のパスワードが推奨されています。
    </p>
    <p>
        当ツールはブラウザ上で動作するため、生成されたパスワードがサーバーに送信されたり保存されたりすることはありません。安心してご利用ください。
    </p>
</div>

<script>
    function generatePassword() {
        const length = document.getElementById('length').value;
        const useUpper = document.getElementById('includeUpper').checked;
        const useNumbers = document.getElementById('includeNumbers').checked;
        const useSymbols = document.getElementById('includeSymbols').checked;

        let charset = "abcdefghijklmnopqrstuvwxyz";
        if (useUpper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useNumbers) charset += "0123456789";
        if (useSymbols) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        let password = "";
        for (let i = 0; i < length; i++) {
            password += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById('passwordOutput').innerText = password;
    }

    function copyPassword() {
        const pass = document.getElementById('passwordOutput').innerText;
        if (pass === "********") return;
        navigator.clipboard.writeText(pass).then(() => {
            alert("コピーしました！");
        });
    }
</script>

</body>
</html>
