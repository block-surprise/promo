<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>友情破壊診断</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f2f2f2;
  color:#222;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

/* ナビ */

.navbar{

  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 20px;

  background:rgba(255,255,255,0.82);

  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(0,0,0,0.06);

  margin-bottom:30px;
}

.logo{
  text-decoration:none;
  color:#111;
  font-size:24px;
  font-weight:800;
}

.nav-menu{
  display:flex;
  gap:10px;
}

.nav-menu a{

  text-decoration:none;
  color:#333;

  background:#f4f4f4;

  padding:10px 14px;

  border-radius:12px;

  transition:0.2s;

  white-space:nowrap;
}

.nav-menu a:hover{
  background:black;
  color:white;
}
.nav-menu a{
  white-space:nowrap;
}
/* タイトル */

h1{
  text-align:center;
  font-size:50px;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:gray;
  margin-bottom:30px;
}

/* セクション */

.section{
  background:white;
  border-radius:25px;
  padding:25px;
  margin-bottom:25px;
  border:1px solid #eee;
}

.section h2{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:15px;
  cursor:pointer;
  font-size:16px;
}

input[type="checkbox"]{
  margin-right:8px;
}

/* ボタン */

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:black;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
}

/* 結果 */

.result{
  display:none;
  margin-top:30px;
  background:white;
  border-radius:25px;
  padding:25px;
  border:1px solid #eee;
  animation:fade 0.3s;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.score{
  text-align:center;
  font-size:60px;
  font-weight:bold;
  margin-bottom:20px;
}

.line{
  margin-bottom:14px;
  font-size:18px;
}

.comment{
  margin-top:20px;
  background:#fafafa;
  border-radius:14px;
  padding:18px;
  line-height:1.8;
}

.share{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.share button{
  flex:1;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:gray;
  font-size:13px;
}

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    gap:15px;
  }

  h1{
    font-size:40px;
  }

}

</style>
</head>

<body>
<nav class="navbar">

  <a href="home.html" class="logo">
    終わり診断
  </a>

  <div class="nav-menu">

    <a href="https://promo.blocksurprise.f5.si/y/">
      友情
    </a>

    <a href="class.html">
      クラス
    </a>

    <a href="net.html">
      ネット
    </a>

  </div>

</nav>
<div class="container">

  <h1>友情破壊診断</h1>
  <p class="sub">
    お前ら、どっちが先に裏切る？
  </p>

  <div class="box">

    <h2>あなた</h2>

    <input type="text" id="yourName" placeholder="あなたの名前">

    <label><input type="checkbox" class="you" value="20"> 返信が遅い</label>
    <label><input type="checkbox" class="you" value="15"> 集合時間に遅れる</label>
    <label><input type="checkbox" class="you" value="-10"> ノリが良い</label>
    <label><input type="checkbox" class="you" value="25"> 既読無視する</label>
    <label><input type="checkbox" class="you" value="-15"> 通話に付き合う</label>
    <label><input type="checkbox" class="you" value="30"> 金欠の時だけ連絡する</label>

  </div>

  <div class="box">

    <h2>友達</h2>

    <input type="text" id="friendName" placeholder="友達の名前">

    <label><input type="checkbox" class="friend" value="20"> 空気を読まない</label>
    <label><input type="checkbox" class="friend" value="25"> 約束を忘れる</label>
    <label><input type="checkbox" class="friend" value="-15"> めっちゃ優しい</label>
    <label><input type="checkbox" class="friend" value="35"> 急に通話切る</label>
    <label><input type="checkbox" class="friend" value="-10"> おもしろい</label>
    <label><input type="checkbox" class="friend" value="30"> 返信が雑</label>

  </div>

  <button onclick="diagnose()">
    診断開始
  </button>

  <div class="result" id="result">

    <div class="score" id="score">
      0%
    </div>

    <div class="line" id="friendship"></div>
    <div class="line" id="betray"></div>
    <div class="line" id="future"></div>

    <div class="comment" id="comment"></div>


<div class="shareButtons">

  <button onclick="copyResult()" class="shareBtn">
    結果をコピー
  </button>

  <button onclick="shareResult()" class="shareBtn">
    共有する
  </button>

</div>
  </div>

  <div class="footer">
    スクショして送りつけろ
  </div>

</div>

<script>

const siteURL = "https://promo.blocksurprise.f5.si/y/";

let resultText = "";

function diagnose(){

  const yourName =
    document.getElementById("yourName").value;

  const friendName =
    document.getElementById("friendName").value;

  if(yourName === "" || friendName === ""){

    alert("名前を入力してください");
    return;

  }

  let score = 100;

  const youChecks =
    document.querySelectorAll(".you:checked");

  const friendChecks =
    document.querySelectorAll(".friend:checked");

  youChecks.forEach(item => {
    score -= Number(item.value);
  });

  friendChecks.forEach(item => {
    score -= Number(item.value);
  });

  if(score < 0){
    score = 0;
  }

  if(score > 100){
    score = 100;
  }

  let rank = "";
  let future = "";
  let comment = "";

  if(score >= 80){

    rank = "親友レベル：SS";
    future = "縁切れ確率：3%";

    comment =
      "普通に仲良くて草。多分ずっと一緒にいる。";

  }

  else if(score >= 60){

    rank = "親友レベル：A";
    future = "縁切れ確率：27%";

    comment =
      "ギリ健全な友情。金の貸し借りは危険。";

  }

  else if(score >= 40){

    rank = "親友レベル：B";
    future = "縁切れ確率：58%";

    comment =
      "クラス替えで自然消滅するタイプ。";

  }

  else if(score >= 20){

    rank = "親友レベル：C";
    future = "縁切れ確率：82%";

    comment =
      "片方かなり我慢してます。";

  }

  else{

    rank = "親友レベル：終";
    future = "縁切れ確率：99%";

    comment =
      "もう友情というより事故。";

  }

  document.getElementById("score").innerText =
    score + "%";

  document.getElementById("friendship").innerText =
    rank;

  document.getElementById("betray").innerText =
    "裏切り危険度：" + (100 - score) + "%";

  document.getElementById("future").innerText =
    future;

  document.getElementById("comment").innerText =
    yourName + " と " + friendName + " の診断結果：\n\n" + comment;

  document.getElementById("result").style.display =
    "block";

  resultText =
`【友情破壊診断】

${yourName} × ${friendName}

友情スコア：${score}%

${rank}
${future}

${comment}

↓ 診断してみて
${siteURL}

#友情破壊診断`;

}

function copyResult(){

  navigator.clipboard.writeText(resultText);

  alert("結果をコピーしました！");

}

async function shareResult(){

  if(navigator.share){

    try{

      await navigator.share({
        title:"友情破壊診断",
        text:resultText
      });

    }catch(err){

      console.log(err);

    }

  }else{

    alert("この端末は共有機能に対応してません");

  }

}

</script>

</body>
</html>
