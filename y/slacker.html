<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>サボり才能診断</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f2f2f2;
  color:#222;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

/* ナビ */

.navbar{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  margin-bottom:30px;
}

.logo{
  text-decoration:none;
  color:#111;
  font-size:24px;
  font-weight:800;
}

.nav-menu{
  display:flex;
  gap:10px;
}

.nav-menu a{
  text-decoration:none;
  color:#333;
  background:#f4f4f4;
  padding:10px 14px;
  border-radius:12px;
  transition:0.2s;
  white-space:nowrap;
}

.nav-menu a:hover{
  background:black;
  color:white;
}

/* タイトル */

h1{
  text-align:center;
  font-size:55px;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:gray;
  margin-bottom:30px;
  line-height:1.8;
}

/* セクション */

.section{
  background:white;
  border-radius:25px;
  padding:25px;
  margin-bottom:25px;
  border:1px solid #eee;
}

.section h2{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:16px;
  font-size:16px;
  cursor:pointer;
}

input[type="checkbox"]{
  margin-right:8px;
}

/* ボタン */

.main-btn{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:black;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.main-btn:hover{
  transform:scale(1.02);
}

/* 結果 */

.result{
  display:none;
  margin-top:30px;
  background:white;
  border-radius:25px;
  padding:25px;
  border:1px solid #eee;
  animation:fade 0.3s;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.score{
  text-align:center;
  font-size:70px;
  font-weight:bold;
  margin-bottom:20px;
}

.line{
  margin-bottom:14px;
  font-size:18px;
}

.comment{
  margin-top:20px;
  background:#fafafa;
  border-radius:14px;
  padding:18px;
  line-height:1.8;
}

/* シェア */

.share{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.share button{
  flex:1;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* フッター */

.footer{
  text-align:center;
  margin-top:20px;
  color:gray;
  font-size:13px;
}

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    gap:15px;
  }

  h1{
    font-size:42px;
  }

}

</style>
</head>

<body>

<nav class="navbar">

  <a href="home.html" class="logo">
    終わり診断
  </a>

  <div class="nav-menu">

    <a href="https://promo.blocksurprise.f5.si/y/">
      友情
    </a>

    <a href="class.html">
      クラス
    </a>

    <a href="net.html">
      ネット
    </a>

 

  </div>

</nav>

<div class="container">

  <h1>
    サボり才能診断
  </h1>

  <p class="sub">
    あなたには“サボりの才能”があります。<br>
    たぶん。
  </p>

  <div class="section">

    <h2>
      あなたの特徴
    </h2>

    <label><input type="checkbox" value="20" class="check"> 宿題を開始する前に休憩する</label>

    <label><input type="checkbox" value="25" class="check"> 「あと5分」が1時間になる</label>

    <label><input type="checkbox" value="15" class="check"> YouTube開いた瞬間終了</label>

    <label><input type="checkbox" value="35" class="check"> ギリギリ提出が基本</label>

    <label><input type="checkbox" value="20" class="check"> 作業前に机掃除始める</label>

    <label><input type="checkbox" value="30" class="check"> 寝る予定じゃない昼寝をする</label>

    <label><input type="checkbox" value="25" class="check"> 「今日はもう無理」が口癖</label>

    <label><input type="checkbox" value="40" class="check"> 締切当日に覚醒する</label>

    <label><input type="checkbox" value="15" class="check"> やる気だけはある</label>

    <label><input type="checkbox" value="30" class="check"> タスク一覧作って満足する</label>

  </div>

  <button class="main-btn" onclick="diagnose()">
    才能を解析する
  </button>

  <div class="result" id="result">

    <div class="score" id="score">
      0%
    </div>

    <div class="line" id="talent"></div>
    <div class="line" id="danger"></div>
    <div class="line" id="future"></div>
    <div class="line" id="power"></div>

    <div class="comment" id="comment"></div>

    <div class="share">

      <button onclick="copyResult()">
        コピー
      </button>

      <button onclick="shareResult()">
        共有
      </button>

    </div>

  </div>

  <div class="footer">
    課題を放置しながら遊べ
  </div>

</div>

<script>

const siteURL = "https://example.com";

let resultText = "";

function diagnose(){

  let score = 0;

  const checks = document.querySelectorAll(".check:checked");

  checks.forEach(item => {
    score += Number(item.value);
  });

  if(score > 100){
    score = 100;
  }

  let talent = "";
  let danger = "";
  let future = "";
  let power = "";
  let comment = "";

  if(score >= 80){

    talent = "サボり才能：SSS";
    danger = "締切危険度：MAX";
    future = "未来：前日覚醒型";
    power = "やる気消失率：98%";

    comment =
    "ギリギリになるほど本気を出す伝説級タイプ。";

  }

  else if(score >= 60){

    talent = "サボり才能：S";
    danger = "締切危険度：高";
    future = "未来：明日から頑張る";
    power = "やる気消失率：82%";

    comment =
    "休憩の才能が異常に高いです。";

  }

  else if(score >= 40){

    talent = "サボり才能：A";
    danger = "締切危険度：中";
    future = "未来：たまに焦る";
    power = "やる気消失率：54%";

    comment =
    "まだ社会復帰できる可能性があります。";

  }

  else{

    talent = "サボり才能：C";
    danger = "締切危険度：低";
    future = "未来：健全";
    power = "やる気消失率：12%";

    comment =
    "真面目すぎます。もっと休んでください。";

  }

  // レア演出

  const rare = Math.floor(Math.random() * 100);

  if(rare === 5){

    comment =
    "覚醒：締切3分前に真の力を発揮します。";

  }

  document.getElementById("score").innerText =
    score + "%";

  document.getElementById("talent").innerText =
    talent;

  document.getElementById("danger").innerText =
    danger;

  document.getElementById("future").innerText =
    future;

  document.getElementById("power").innerText =
    power;

  document.getElementById("comment").innerText =
    comment;

  document.getElementById("result").style.display =
    "block";

  resultText =
`【サボり才能診断】

サボり才能：${score}%

${talent}
${danger}
${future}
${power}

${comment}

↓ あなたも診断してみよう！
${siteURL}

#サボり才能診断`;

}

function copyResult(){

  navigator.clipboard.writeText(resultText);

  alert("結果をコピーしました！");

}

async function shareResult(){

  if(navigator.share){

    try{

      await navigator.share({
        title:"サボり才能診断",
        text:resultText
      });

    }catch(err){
      console.log(err);
    }

  }else{

    alert("この端末は共有に対応してません");

  }

}

</script>

</body>
</html>
