<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ネット人格診断</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f2f2f2;
  color:#222;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

/* ナビ */

.navbar{

  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 20px;

  background:rgba(255,255,255,0.82);

  backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(0,0,0,0.06);

  margin-bottom:30px;
}

.logo{
  text-decoration:none;
  color:#111;
  font-size:24px;
  font-weight:800;
}

.nav-menu{
  display:flex;
  gap:10px;
}

.nav-menu a{

  text-decoration:none;
  color:#333;

  background:#f4f4f4;

  padding:10px 14px;

  border-radius:12px;

  transition:0.2s;

  white-space:nowrap;
}

.nav-menu a:hover{
  background:black;
  color:white;
}
.nav-menu a{
  white-space:nowrap;
}
/* タイトル */

h1{
  text-align:center;
  font-size:50px;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:gray;
  margin-bottom:30px;
}

/* セクション */

.section{
  background:white;
  border-radius:25px;
  padding:25px;
  margin-bottom:25px;
  border:1px solid #eee;
}

.section h2{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:15px;
  cursor:pointer;
  font-size:16px;
}

input[type="checkbox"]{
  margin-right:8px;
}

/* ボタン */

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:black;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
}

/* 結果 */

.result{
  display:none;
  margin-top:30px;
  background:white;
  border-radius:25px;
  padding:25px;
  border:1px solid #eee;
  animation:fade 0.3s;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.score{
  text-align:center;
  font-size:60px;
  font-weight:bold;
  margin-bottom:20px;
}

.line{
  margin-bottom:14px;
  font-size:18px;
}

.comment{
  margin-top:20px;
  background:#fafafa;
  border-radius:14px;
  padding:18px;
  line-height:1.8;
}

.share{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.share button{
  flex:1;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:gray;
  font-size:13px;
}

@media(max-width:700px){

  .navbar{
    flex-direction:column;
    gap:15px;
  }

  h1{
    font-size:40px;
  }

}

</style>
</head>

<body>

<nav class="navbar">

  <a href="home.html" class="logo">
    終わり診断
  </a>

  <div class="nav-menu">

    <a href="https://promo.blocksurprise.f5.si/y/">
      友情
    </a>

    <a href="class.html">
      クラス
    </a>

    <a href="net.html">
      ネット
    </a>

  </div>

</nav>

<div class="container">

  <h1>
    ネット人格診断
  </h1>

  <p class="sub">
    あなたのインターネット人格、バレてます。
  </p>

  <div class="section">

    <h2>
      あなたの特徴
    </h2>

    <label><input type="checkbox" value="20" class="check"> 深夜2時以降も起きてる</label>

    <label><input type="checkbox" value="15" class="check"> Discordを常に開いてる</label>

    <label><input type="checkbox" value="10" class="check"> ミーム画像を保存してる</label>

    <label><input type="checkbox" value="25" class="check"> ROM専になりがち</label>

    <label><input type="checkbox" value="20" class="check"> コメント欄を全部読む</label>

    <label><input type="checkbox" value="30" class="check"> 「草」だけ返信する</label>

    <label><input type="checkbox" value="15" class="check"> 深夜テンションで投稿する</label>

    <label><input type="checkbox" value="35" class="check"> ネットミームしか喋れない</label>

    <label><input type="checkbox" value="25" class="check"> 通知300件放置</label>

    <label><input type="checkbox" value="40" class="check"> 一生ショート動画見てる</label>

  </div>

  <button onclick="diagnose()">
    人格を解析する
  </button>

  <div class="result" id="result">

    <div class="score" id="score">
      0%
    </div>

    <div class="line" id="type"></div>
    <div class="line" id="danger"></div>
    <div class="line" id="future"></div>
    <div class="line" id="grass"></div>

    <div class="comment" id="comment"></div>

    <div class="share">

      <button onclick="copyResult()">
        コピー
      </button>

      <button onclick="shareResult()">
        共有
      </button>

    </div>

  </div>

  <div class="footer">
    スクショしてLINEで共有しよう！
  </div>

</div>

<script>

const siteURL = "https://example.com";

let resultText = "";

function diagnose(){

  let score = 0;

  const checks = document.querySelectorAll(".check:checked");

  checks.forEach(item => {
    score += Number(item.value);
  });

  if(score > 100){
    score = 100;
  }

  let type = "";
  let danger = "";
  let future = "";
  let grass = "";
  let comment = "";

  if(score >= 80){

    type = "人格分類：インターネット生命体";
    danger = "ネット依存度：MAX";
    future = "未来：睡眠時間が消滅";
    grass = "草使用率：99%";

    comment =
    "現実世界よりインターネットの方が本体です。";

  }

  else if(score >= 60){

    type = "人格分類：深夜徘徊型";
    danger = "ネット依存度：高";
    future = "未来：おすすめ欄に支配される";
    grass = "草使用率：87%";

    comment =
    "夜になると急に元気になります。";

  }

  else if(score >= 40){

    type = "人格分類：一般ネット民";
    danger = "ネット依存度：中";
    future = "未来：通知が増え続ける";
    grass = "草使用率：64%";

    comment =
    "まだギリギリ現実へ戻れます。";

  }

  else{

    type = "人格分類：健全人類";
    danger = "ネット依存度：低";
    future = "未来：正常";
    grass = "草使用率：12%";

    comment =
    "逆にどうやって生きてるんですか？";

  }

  document.getElementById("score").innerText =
    score + "%";

  document.getElementById("type").innerText =
    type;

  document.getElementById("danger").innerText =
    danger;

  document.getElementById("future").innerText =
    future;

  document.getElementById("grass").innerText =
    grass;

  document.getElementById("comment").innerText =
    comment;

  document.getElementById("result").style.display =
    "block";

  resultText =
`【ネット人格診断】

ネット人格スコア：${score}%

${type}
${danger}
${future}
${grass}

${comment}

↓ あなたも診断してみよう！
${siteURL}

#ネット人格診断`;

}

function copyResult(){

  navigator.clipboard.writeText(resultText);

  alert("結果をコピーしました！");

}

async function shareResult(){

  if(navigator.share){

    try{

      await navigator.share({
        title:"ネット人格診断",
        text:resultText
      });

    }catch(err){
      console.log(err);
    }

  }else{

    alert("この端末は共有に対応してません");

  }

}

</script>

</body>
</html>
