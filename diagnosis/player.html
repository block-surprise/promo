<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make DI | 診断を遊ぶ</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-answer { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 2px solid #e2e8f0; cursor: pointer; text-align: left; background: #f1f5f9; }
        .btn-answer:active { background: #6366f1; color: white; }
        .header { width: 100%; padding: 40px 0; text-align: center; background: white; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<header>
<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;">
    <div style="font-weight: 900; font-size: 1.4rem; color: #6366f1; letter-spacing: -1px;">MAKE DI</div>
    <div style="display: flex; gap: 20px; font-size: 0.9rem; font-weight: bold;">
        <a href="index.html" style="text-decoration: none; color: #64748b;">ホーム</a>
        <a href="editor.html" style="text-decoration: none; color: #64748b;">作る</a>
        <a href="explore.html" style="text-decoration: none; color: #64748b;">探す</a>
    </div>
</nav>
    </header>
<div class="card">
    <h1 id="title">診断を読み込み中...</h1>
    <div id="game-area">
        <p id="question-text"></p>
        <div id="options"></div>
    </div>
    <div id="result-area" style="display:none; text-align:center;">
        <p>結果は...</p>
        <h2 id="result-name" style="color:#6366f1; font-size: 2rem;"></h2>
        <button onclick="location.reload()" style="margin-top:20px;">もう一度遊ぶ</button>
    </div>
</div>

<script>

// --- あなたの設定 ---
const SHEET_ID = '1EYXz3Preu5Xf0OKVXomovvzHJP4MtRQDgaQC0rWney0';

let currentDiagnostic = null;
let currentIdx = 0;
let totalScore = 0;

// 1. 最初に呼ばれる関数
function loadData() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
        document.getElementById('title').innerText = "IDを入力してください";
        return;
    }

    // Googleスプレッドシートから「スクリプト」としてデータを取得（CORS回避）
    const script = document.createElement('script');
    // responseHandlerに「myDataLoader」を指定するのがコツ
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:myDataLoader`;
    document.body.appendChild(script);
}

// 2. データが届いたらGoogleが勝手に実行してくれる関数
window.myDataLoader = function(response) {
    const id = new URLSearchParams(window.location.search).get('id');
    const rows = response.table.rows;
    let foundData = null;

    for (let row of rows) {
        // C列（index 2）の中身を確認
        if (row.c && row.c[2] && row.c[2].v) {
            const cellValue = String(row.c[2].v);
            if (cellValue.includes('{')) {
                try {
                    // CSVと違って、gviz経由なら "" の置換は不要
                    const d = JSON.parse(cellValue);
                    if (String(d.id) === String(id)) {
                        foundData = d;
                        break;
                    }
                } catch (e) {
                    console.error("JSONパース失敗:", e);
                }
            }
        }
    }

    if (foundData) {
        currentDiagnostic = foundData;
        start();
    } else {
        document.getElementById('title').innerText = "診断が見つかりませんでした";
        console.log("探したID:", id);
    }
};

function start() {
    document.getElementById('title').innerText = currentDiagnostic.title;
    render();
}

function render() {
    if (currentIdx < currentDiagnostic.questions.length) {
        const q = currentDiagnostic.questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('options').innerHTML = `
            <button class="btn-answer" onclick="answer(1)">${q.a1}</button>
            <button class="btn-answer" onclick="answer(-1)">${q.a2}</button>
        `;
    } else {
        showResult();
    }
}

function answer(pts) {
    totalScore += pts;
    currentIdx++;
    render();
}

function showResult() {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-name').innerText = (totalScore >= 0) ? currentDiagnostic.typeA : currentDiagnostic.typeB;
}

// 実行！
loadData();
</script>
</body>
</html>
