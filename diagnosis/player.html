<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-PLAY | 診断を遊ぶ</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-answer { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 2px solid #e2e8f0; cursor: pointer; text-align: left; background: #f1f5f9; }
        .btn-answer:active { background: #6366f1; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="title">診断を読み込み中...</h1>
    <div id="game-area">
        <p id="question-text"></p>
        <div id="options"></div>
    </div>
    <div id="result-area" style="display:none; text-align:center;">
        <p>結果は...</p>
        <h2 id="result-name" style="color:#6366f1; font-size: 2rem;"></h2>
        <button onclick="location.reload()" style="margin-top:20px;">もう一度遊ぶ</button>
    </div>
</div>

<script>
    // --- あなたの設定 ---
    const SHEET_ID = '1vSCC4P-0DUC4osb7lmP2ncQHYrAUGDED9snXe_YEsGqZj2u0QEs9K7osEC_lXQqG_WpyLKwKz-Gq-GP';

    let currentDiagnostic = null;
    let currentIdx = 0;
    let totalScore = 0;

    async function loadData() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) {
            document.getElementById('title').innerText = "IDが指定されていません";
            return;
        }

        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
            
            // スプレッドシートの全行をループしてIDを探す
            for (let row of json.table.rows) {
                if (row.c && row.c[2] && row.c[2].v) {
                    const d = JSON.parse(row.c[2].v);
                    if (String(d.id) === String(id)) {
                        currentDiagnostic = d;
                        break;
                    }
                }
            }

            if (currentDiagnostic) {
                start();
            } else {
                document.getElementById('title').innerText = "診断が見つかりません";
            }
        } catch (e) {
            document.getElementById('title').innerText = "読み込みエラー";
            console.error(e);
        }
    }

    function start() {
        document.getElementById('title').innerText = currentDiagnostic.title;
        render();
    }

    function render() {
        if (currentIdx < currentDiagnostic.questions.length) {
            const q = currentDiagnostic.questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('options').innerHTML = `
                <button class="btn-answer" onclick="answer(1)">${q.a1}</button>
                <button class="btn-answer" onclick="answer(-1)">${q.a2}</button>
            `;
        } else {
            showResult();
        }
    }

    function answer(pts) {
        totalScore += pts;
        currentIdx++;
        render();
    }

    function showResult() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('result-name').innerText = (totalScore >= 0) ? currentDiagnostic.typeA : currentDiagnostic.typeB;
    }

    loadData();
</script>
</body>
</html>
