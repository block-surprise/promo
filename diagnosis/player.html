<style>

<body>
 
<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #ff7800; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 12px rgba(255, 120, 0, 0.2);">
    <div style="font-weight: 900; font-size: 1.4rem; color: white; letter-spacing: -1px;">MAKE DI</div>
    <div style="display: flex; gap: 20px; font-size: 0.9rem; font-weight: bold;">
        <a href="index.html" style="text-decoration: none; color: white;">ホーム</a>
        <a href="editor.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">作る</a>
        <a href="explore.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">探す</a>
    </div>
</nav>

    <div class="main-container">
        <div id="title">診断を読み込み中...</div>
        
        <div id="game-area">
            <p id="question-text"></p>
            <div id="options"></div>
        </div>

        <div id="result-area" style="display:none; text-align:center;">
            <p style="color: #64748b; font-weight: bold;">診断結果</p>
            <h2 id="result-name"></h2>
            <button class="btn-retry" onclick="location.reload()">もう一度遊ぶ</button>
        </div>
    </div>
    


<script>

// --- あなたの設定 ---
const SHEET_ID = '1EYXz3Preu5Xf0OKVXomovvzHJP4MtRQDgaQC0rWney0';

let currentDiagnostic = null;
let currentIdx = 0;
let totalScore = 0;

// 1. 最初に呼ばれる関数
function loadData() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
        document.getElementById('title').innerText = "IDを入力してください";
        return;
    }

    // Googleスプレッドシートから「スクリプト」としてデータを取得（CORS回避）
    const script = document.createElement('script');
    // responseHandlerに「myDataLoader」を指定するのがコツ
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:myDataLoader`;
    document.body.appendChild(script);
}

// 2. データが届いたらGoogleが勝手に実行してくれる関数
window.myDataLoader = function(response) {
    const id = new URLSearchParams(window.location.search).get('id');
    const rows = response.table.rows;
    let foundData = null;

    for (let row of rows) {
        // C列（index 2）の中身を確認
        if (row.c && row.c[2] && row.c[2].v) {
            const cellValue = String(row.c[2].v);
            if (cellValue.includes('{')) {
                try {
                    // CSVと違って、gviz経由なら "" の置換は不要
                    const d = JSON.parse(cellValue);
                    if (String(d.id) === String(id)) {
                        foundData = d;
                        break;
                    }
                } catch (e) {
                    console.error("JSONパース失敗:", e);
                }
            }
        }
    }

    if (foundData) {
        currentDiagnostic = foundData;
        const pageTitle = `${currentDiagnostic.title} | MAKE DI`;
        document.title = pageTitle; 
        document.getElementById('og-title').setAttribute('content', pageTitle);
        document.getElementById('og-url').setAttribute('content', window.location.href);
        start();
    } else {
        document.getElementById('title').innerText = "診断が見つかりませんでした";
        console.log("探したID:", id);
    }
};

function start() {
    document.getElementById('title').innerText = currentDiagnostic.title;
    render();
}

function render() {
    if (currentIdx < currentDiagnostic.questions.length) {
        const q = currentDiagnostic.questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('options').innerHTML = `
            <button class="btn-answer" onclick="answer(1)">${q.a1}</button>
            <button class="btn-answer" onclick="answer(-1)">${q.a2}</button>
        `;
    } else {
        showResult();
    }
}

function answer(pts) {
    totalScore += pts;
    currentIdx++;
    render();
}

function showResult() {
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-name').innerText = (totalScore >= 0) ? currentDiagnostic.typeA : currentDiagnostic.typeB;
}

// 実行！
loadData();
</script>
</body>
