<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-MAKE | フォーム連携版</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; text-align: center; color: var(--primary); }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: #10b981; color: white; }
        .q-block { border-left: 4px solid var(--primary); padding-left: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" id="editor">
    <div class="card">
        <h1>診断エディタ</h1>
        <label>診断タイトル</label>
        <input type="text" id="title" placeholder="例：マイクラ適性診断">
        
        <div id="questions-list"></div>
        <button onclick="addQuestionField()" style="background:#eee;">＋ 質問を追加</button>

        <label>結果A</label><input type="text" id="typeA" placeholder="結果1">
        <label>結果B</label><input type="text" id="typeB" placeholder="結果2">
        
        <button class="btn-save" onclick="saveToForm()">サーバーに保存して公開</button>
    </div>
</div>

<script>
    let qCount = 0;
    addQuestionField();

    function addQuestionField() {
        qCount++;
        const list = document.getElementById('questions-list');
        list.insertAdjacentHTML('beforeend', `
            <div class="q-block">
                <label>質問 ${qCount}</label>
                <input type="text" class="q-text" placeholder="質問文">
                <input type="text" class="a1-text" placeholder="選択肢1(A点)">
                <input type="text" class="a2-text" placeholder="選択肢2(B点)">
            </div>
        `);
    }

    async function saveToForm() {
        const title = document.getElementById('title').value;
        const qTexts = document.querySelectorAll('.q-text');
        const a1Texts = document.querySelectorAll('.a1-text');
        const a2Texts = document.querySelectorAll('.a2-text');

        // データをまとめる
        const diagnosticData = {
            title: title,
            typeA: document.getElementById('typeA').value,
            typeB: document.getElementById('typeB').value,
            questions: []
        };

        qTexts.forEach((q, i) => {
            diagnosticData.questions.push({
                q: q.value, a1: a1Texts[i].value, a2: a2Texts[i].value
            });
        });

        // GoogleフォームのURLとID
        const formID = "1FAIpQLSdSKCj3z-x-krRzGS5Ux2xCnnnOa4b57tNIYbdiqJsORkenpQ";
        const titleEntry = "entry.353362422";
        const dataEntry = "entry.673959864";

        const postUrl = `https://docs.google.com/forms/d/e/${formID}/formResponse?${titleEntry}=${encodeURIComponent(title)}&${dataEntry}=${encodeURIComponent(JSON.stringify(diagnosticData))}&submit=Submit`;

        // 送信（no-corsモードで警告を回避）
        fetch(postUrl, { mode: 'no-cors' }).then(() => {
            alert("診断を保存しました！\nGoogleフォームに紐付いたスプレッドシートを確認してください。");
        }).catch(e => alert("エラーが発生しました"));
    }
</script>

</body>
</html>
