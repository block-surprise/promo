<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-MAKE | ホーム</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; padding: 40px 0; text-align: center; background: white; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--primary); margin: 0; }
        .tagline { font-size: 0.9rem; color: #64748b; margin-top: 5px; }

        .container { width: 90%; max-width: 500px; margin-top: 30px; }
        
        .menu-card { 
            background: white; border-radius: 24px; padding: 30px; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-decoration: none; display: block;
            transition: transform 0.2s, box-shadow 0.2s; border: 1px solid transparent;
        }
        .menu-card:active { transform: scale(0.98); }
        .menu-card.make { border-left: 8px solid #10b981; }
        .menu-card.play { border-left: 8px solid var(--primary); }

        .menu-title { font-size: 1.2rem; font-weight: bold; margin: 0; color: var(--text); }
        .menu-desc { font-size: 0.85rem; color: #64748b; margin-top: 8px; line-height: 1.4; }

        .footer { margin-top: auto; padding: 30px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo">D-MAKE</h1>
        <p class="tagline">自分専用の診断メーカーを作ろう</p>
    </header>

    <div class="container">
        <!-- 作成ページへ -->
        <a href="editor.html" class="menu-card make">
            <p class="menu-title" style="color: #10b981;">Create / 作る</p>
            <p class="menu-desc">オリジナルの診断を作成して、URLを発行します。質問や結果を自由にカスタマイズ可能。</p>
        </a>

        <!-- 自分の診断一覧や遊び方（今は説明のみ） -->
        <a href="#" onclick="alert('発行済みのURLから直接遊べます！')" class="menu-card play">
            <p class="menu-title" style="color: var(--primary);">Play / 遊ぶ</p>
            <p class="menu-desc">発行されたURLにアクセスして診断を開始します。友達にURLをシェアして遊んでもらおう。</p>
        </a>

        <!-- 開発者メモ的なエリア -->
        <div style="padding: 10px 20px;">
            <p style="font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 5px;">SYSTEM STATUS</p>
            <div style="display: flex; gap: 10px;">
                <span style="font-size: 0.7rem; background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 20px;">Database: Connected</span>
                <span style="font-size: 0.7rem; background: #e0e7ff; color: #3730a3; padding: 4px 8px; border-radius: 20px;">Version: 1.0.0</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 D-MAKE Project. Developed by 14yo Web Dev.
    </footer>

</body>
</html>
