<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-MAKE Pro | 診断メーカー</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Bento UI Style Card */
        .card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 24px; color: var(--primary); }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-top: 15px; }
        
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-add { background: #ec4899; color: white; margin-top: 10px; }
        .btn-answer { background: #f1f5f9; color: #475569; border: 2px solid #e2e8f0; }
        .btn-answer:active { background: var(--primary); color: white; }

        .q-block { border-left: 4px solid var(--primary); padding-left: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="editor">
    <div class="card">
        <h1>診断エディタ</h1>
        <label>診断タイトル</label>
        <input type="text" id="title" placeholder="例：あなたのマイクラ適性診断">
        
        <div id="questions-list">
            <!-- ここに質問が追加される -->
        </div>
        
        <button class="btn-add" onclick="addQuestionField()">＋ 質問を追加</button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <label>結果：タイプAの名前</label>
        <input type="text" id="typeA" placeholder="例：最強の建築家">
        <label>結果：タイプBの名前</label>
        <input type="text" id="typeB" placeholder="例：孤高のサバイバリスト">
        
        <button class="btn-primary" onclick="startDiagnostic()">診断を開始する (プレビュー)</button>
    </div>
</div>

<div class="container" id="player" style="display:none;">
    <div class="card">
        <h1 id="p-title"></h1>
        <div id="game-area">
            <p id="p-q-text" style="font-size: 1.1rem; font-weight: bold;"></p>
            <div id="p-options"></div>
        </div>
        <div id="result-area" style="display:none; text-align:center;">
            <p style="color: #64748b;">あなたの診断結果は...</p>
            <h2 id="p-result-name" style="font-size: 2rem; color: var(--primary);"></h2>
            <button class="btn-primary" onclick="location.reload()">作り直す</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentQIndex = 0;
    let score = 0;
    let qCount = 0;

    // 最初に1つ質問フィールドを作っておく
    addQuestionField();

    function addQuestionField() {
        qCount++;
        const list = document.getElementById('questions-list');
        const html = `
            <div class="q-block" id="q-field-${qCount}">
                <label>質問 ${qCount}</label>
                <input type="text" class="q-input" placeholder="質問文を入力">
                <input type="text" class="a1-input" placeholder="選択肢1 (タイプA点)">
                <input type="text" class="a2-input" placeholder="選択肢2 (タイプB点)">
            </div>
        `;
        list.insertAdjacentHTML('beforeend', html);
    }

    function startDiagnostic() {
        // データの収集
        const qInputs = document.querySelectorAll('.q-input');
        const a1Inputs = document.querySelectorAll('.a1-input');
        const a2Inputs = document.querySelectorAll('.a2-input');
        
        questions = [];
        for(let i=0; i<qInputs.length; i++) {
            questions.push({
                q: qInputs[i].value,
                a1: a1Inputs[i].value,
                a2: a2Inputs[i].value
            });
        }

        // 表示切り替え
        document.getElementById('editor').style.display = 'none';
        document.getElementById('player').style.display = 'block';
        document.getElementById('p-title').innerText = document.getElementById('title').value;
        
        showQuestion();
    }

    function showQuestion() {
        if(currentQIndex < questions.length) {
            const qData = questions[currentQIndex];
            document.getElementById('p-q-text').innerText = qData.q;
            document.getElementById('p-options').innerHTML = `
                <button class="btn-answer" onclick="answer(1)">${qData.a1}</button>
                <button class="btn-answer" onclick="answer(-1)">${qData.a2}</button>
            `;
        } else {
            showResult();
        }
    }

    function answer(point) {
        score += point;
        currentQIndex++;
        showQuestion();
    }

    function showResult() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        const typeA = document.getElementById('typeA').value;
        const typeB = document.getElementById('typeB').value;
        document.getElementById('p-result-name').innerText = (score >= 0) ? typeA : typeB;
    }
</script>

</body>
</html>
