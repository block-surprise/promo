<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make DI | ホーム</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; padding: 40px 0; text-align: center; background: white; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--primary); margin: 0; }
        .tagline { font-size: 0.9rem; color: #64748b; margin-top: 5px; }

        .container { width: 90%; max-width: 500px; margin-top: 30px; }
        
        .menu-card { 
            background: white; border-radius: 24px; padding: 30px; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-decoration: none; display: block;
            transition: transform 0.2s, box-shadow 0.2s; border: 1px solid transparent;
        }
        .menu-card:active { transform: scale(0.98); }
        .menu-card.make { border-left: 8px solid #10b981; }
        .menu-card.play { border-left: 8px solid var(--primary); }

        .menu-title { font-size: 1.2rem; font-weight: bold; margin: 0; color: var(--text); }
        .menu-desc { font-size: 0.85rem; color: #64748b; margin-top: 8px; line-height: 1.4; }

        .footer { margin-top: auto; padding: 30px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #ff7800; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 12px rgba(255, 120, 0, 0.2);">
    <div style="font-weight: 900; font-size: 1.4rem; color: white; letter-spacing: -1px;">MAKE DI</div>
    <div style="display: flex; gap: 20px; font-size: 0.9rem; font-weight: bold;">
        <a href="index.html" style="text-decoration: none; color: white;">ホーム</a>
        <a href="editor.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">作る</a>
        <a href="explore.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">探す</a>
    </div>
</nav>

    <div class="container">
        <!-- 作成ページへ -->
        <a href="editor.html" class="menu-card make">
            <p class="menu-title" style="color: #10b981;">Create / 作る</p>
            <p class="menu-desc">オリジナルの診断を作成して、URLを発行します。質問や結果を自由にカスタマイズ可能。</p>
        </a>

        <!-- 自分の診断一覧や遊び方（今は説明のみ） -->
        <a href="#" onclick="alert('発行済みのURLから直接遊べます！')" class="menu-card play">
            <p class="menu-title" style="color: var(--primary);">Play / 遊ぶ</p>
            <p class="menu-desc">発行されたURLにアクセスして診断を開始します。友達にURLをシェアして遊んでもらおう。</p>
        </a>
<!-- index.html の中身 -->
<div class="container" style="max-width: 800px; margin: 30px auto; padding: 0 20px;">
    
    <!-- メインビジュアル -->
    <div style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); padding: 40px; border-radius: 30px; color: white; text-align: center; margin-bottom: 40px;">
        <h2 style="font-size: 2rem; margin: 0;">アイディアを、診断に。</h2>
        <p style="opacity: 0.9;">世界に一つだけのオリジナル診断を作ってシェアしよう</p>
        <button onclick="location.href='editor.html'" style="background: white; color: #6366f1; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer;">今すぐ作る</button>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
        
        <!-- 左側：新着診断 -->
        <section>
            <h3 style="display: flex; align-items: center; gap: 8px;">
                <span style="background: #10b981; width: 4px; height: 1.2em; display: inline-block; border-radius: 2px;"></span>
                新着の診断
            </h3>
            <div id="recent-list" style="display: flex; flex-direction: column; gap: 15px;">
                <p style="color: #94a3b8;">読み込み中...</p>
            </div>
        </section>

        <!-- 右側：ランキング -->
        <section>
            <h3 style="display: flex; align-items: center; gap: 8px;">
                <span style="background: #f59e0b; width: 4px; height: 1.2em; display: inline-block; border-radius: 2px;"></span>
                人気TOP5
            </h3>
            <div id="ranking-list" style="background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <!-- ここにランキングが入る -->
            </div>
        </section>

    </div>
</div>

<script>
    const SHEET_ID = '1EYXz3Preu5Xf0OKVXomovvzHJP4MtRQDgaQC0rWney0';

    async function loadPublicList() {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        try {
            const res = await fetch(url);
            const csv = await res.text();
            const rows = csv.split('\n').reverse(); // 新しい順にする
            
            const recentList = document.getElementById('recent-list');
            recentList.innerHTML = '';

            let count = 0;
            for (let row of rows) {
                const match = row.match(/\{.*\}/);
                if (!match) continue;
                
                const data = JSON.parse(match[0].replace(/""/g, '"'));
                
                // 「全体公開」のものだけを表示
                if (data.visibility === 'public' && count < 10) {
                    recentList.innerHTML += `
                        <a href="player.html?id=${data.id}" style="text-decoration:none; color:inherit;">
                            <div class="menu-card" style="padding:20px; background:white; border-radius:15px; border:1px solid #e2e8f0;">
                                <div style="font-weight:bold;">${data.title}</div>
                            </div>
                        </a>
                    `;
                    count++;
                }
            }
        } catch (e) {
            console.error(e);
        }
    }
    loadPublicList();
</script>
        <!-- 開発者メモ的なエリア -->
        <div style="padding: 10px 20px;">
            <p style="font-size: 0.8rem; font-weight: bold; color: #64748b; margin-bottom: 5px;">SYSTEM STATUS</p>
            <div style="display: flex; gap: 10px;">
                <span style="font-size: 0.7rem; background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 20px;">Database: Connected</span>
                <span style="font-size: 0.7rem; background: #e0e7ff; color: #3730a3; padding: 4px 8px; border-radius: 20px;">Version: 1.0.0</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 D-MAKE Project. Developed by 14yo Web Dev.
    </footer>

</body>
</html>
