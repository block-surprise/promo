<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="keywords" content="診断作成, 診断メーカー, MAKE DI, 無料, オリジナル診断作成">
    <meta property="og:title" content="MAKE DI | 診断エディタ">
    <meta property="og:description" content="アイディアを形に。あなたのオリジナル診断を今すぐ作ってみよう！">

    <meta property="og:url" content="https://promo.blocksurprise.f5.si/diagnosis/editor.html">

    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --text: #1e293b; }
        
        /* スマホ向けにフォントサイズを自動調整させない */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            -webkit-text-size-adjust: 100%;
        }

        /* コンテナを画面幅いっぱいに近くする */
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        
        .card { 
            background: white; 
            border-radius: 24px; 
            padding: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }

        h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 25px; color: var(--primary); text-align: center; }
        
        /* 入力エリアのラベルを見やすく */
        label { font-size: 0.8rem; font-weight: bold; display: block; margin-top: 20px; color: #64748b; margin-left: 5px; }

        /* 入力欄をスマホで押しやすく（高さ44px以上） */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            box-sizing: border-box; 
            font-size: 16px; /* iPhoneでズームされないための16px */
            background: #f8fafc;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        /* ボタンのデザインを強化 */
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            border-radius: 16px; 
            border: none; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }

        .btn-add { background: #e0e7ff; color: var(--primary); }
        .btn-save { background: var(--primary); color: white; margin-top: 30px; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }

        /* 質問ブロックを整理 */
        .q-block { 
            border: 1px solid #e2e8f0; 
            border-left: 6px solid var(--primary); 
            padding: 15px; 
            border-radius: 16px; 
            margin-top: 20px; 
            background: white;
        }

        /* 共有エリアをより目立たせる */
        #share-area { 
            display: none; 
            background: #f0fdf4; 
            border: 2px dashed #22c55e; 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 30px; 
            text-align: center;
        }
        #share-url { background: white; border: 1px solid #dcfce7; text-align: center; color: #15803d; font-weight: bold; }
    </style>
</head>
<body>

<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #ff7800; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 12px rgba(255, 120, 0, 0.2);">
    <div style="font-weight: 900; font-size: 1.4rem; color: white; letter-spacing: -1px;">MAKE DI</div>
    <div style="display: flex; gap: 20px; font-size: 0.9rem; font-weight: bold;">
        <a href="index.html" style="text-decoration: none; color: white;">ホーム</a>
        <a href="editor.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">作る</a>
        <a href="explore.html" style="text-decoration: none; color: rgba(255,255,255,0.8);">探す</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>診断エディタ</h1>
        
        <label>診断タイトル</label>
        <input type="text" id="title" placeholder="例：マイクラ建築士診断">

        <label>公開設定</label>
        <select id="visibility">
            <option value="public">全体に公開（探すページに載る）</option>
            <option value="private">リンクを知っている人のみ</option>
        </select>
        
        <div id="questions-list"></div>
        
        <button class="btn-add" onclick="addQuestion()">＋ 質問を追加</button>


<div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-size: 1rem; color: var(--primary);">診断結果の設定</h2>
    </div>
    <div id="results-list"></div>
    <button type="button" class="btn-add" onclick="addResult()" style="background: #fff7ed; color: #ff7800; border: 1px solid #ff7800;">＋ 結果を追加</button>
</div>


        
        <button class="btn-save" onclick="save()">診断を保存してURL発行</button>

        <div id="share-area">
            <p style="margin:0 0 10px 0; font-size:14px; font-weight:bold; color:#166534;">🎉 診断が完成しました！</p>
            <input type="text" id="share-url" readonly onclick="this.select()">
            <p style="font-size:12px; color:#166534; margin-top:10px;">URLをコピーしてSNSや友達にシェアしてね</p>
        </div>
    </div>
</div>

<script>
const FORM_ID = "1FAIpQLSdSKCj3z-x-krRzGS5Ux2xCnnnOa4b57tNIYbdiqJsORkenpQ";
    const ENTRY_TITLE = "entry.353362422";
    const ENTRY_DATA = "entry.673959864";
    const PLAYER_PAGE = "player.html"; 

    let qCount = 0;
    let rCount = 0;

    // 最初に質問1つと、結果の枠を2つ表示しておく
    addQuestion();
    addResult("プロ級", 10);
    addResult("初心者級", 0);

    // 質問を追加する関数
    function addQuestion() {
        qCount++;
        document.getElementById('questions-list').insertAdjacentHTML('beforeend', `
            <div class="q-block">
                <div style="font-weight:bold; font-size:0.9rem; color:var(--primary); margin-bottom:10px;">質問 ${qCount}</div>
                <input type="text" class="q-text" placeholder="質問文を入力">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" class="a1-text" placeholder="選択肢1 (+)">
                    <input type="text" class="a2-text" placeholder="選択肢2 (-)">
                </div>
            </div>
        `);
    }

    // 結果を追加する関数（新しく追加）
    function addResult(name = "", score = 0) {
        rCount++;
        document.getElementById('results-list').insertAdjacentHTML('beforeend', `
            <div class="r-block" style="border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-top: 10px; background: #fff;">
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                    <input type="text" class="r-name" value="${name}" placeholder="結果の名前（例：神）">
                    <input type="number" class="r-min" value="${score}" title="この点数以上で表示">
                </div>
                <p style="font-size:10px; color:#94a3b8; margin:5px 0 0 5px;">この点数以上でこの結果になります</p>
            </div>
        `);
    }

    function save() {
    const title = document.getElementById('title').value;
    if(!title) return alert("タイトルを入力してください");

    const randomID = Date.now().toString(36) + Math.random().toString(36).substring(2, 5);

    const data = {
        id: randomID,
        title: title,
        visibility: document.getElementById('visibility').value,
        results: Array.from(document.querySelectorAll('.r-block')).map(b => ({
            name: b.querySelector('.r-name').value,
            minScore: parseInt(b.querySelector('.r-min').value) || 0
        })),
        questions: Array.from(document.querySelectorAll('.q-block')).map(b => ({
            q: b.querySelector('.q-text').value,
            a1: b.querySelector('.a1-text').value,
            a2: b.querySelector('.a2-text').value
        }))
    };

    // 1. URLの修正（/d/e/ に変更）
    const postUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
    
    // 2. URLSearchParams を使って、特殊文字を完璧にエンコードする
    const params = new URLSearchParams();
    params.append(ENTRY_TITLE, title);
    params.append(ENTRY_DATA, JSON.stringify(data));
    params.append('submit', 'Submit');

    // 3. 送信（エラーが出ないのは mode: 'no-cors' の仕様です）
    fetch(`${postUrl}?${params.toString()}`, { 
        mode: 'no-cors',
        method: 'GET' // 確実にパラメータを届けるためにGETを指定
    }).then(() => {
        // 送信直後に完了画面を出す
        const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const finalUrl = currentPath + PLAYER_PAGE + "?id=" + randomID;

        document.getElementById('share-area').style.display = 'block';
        document.getElementById('share-url').value = finalUrl;
        document.getElementById('share-area').scrollIntoView({ behavior: 'smooth' });
    });
}

</script>

</body>
</html>
