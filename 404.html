<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --primary: #4caf50;
            --bg: #f5f7fa;
            --text: #333;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            color: #e1e4e8;
            line-height: 1;
        }
        .mc-msg {
            background: #222;
            color: #00ff00;
            padding: 15px;
            font-family: monospace;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.9rem;
            border-left: 5px solid var(--primary);
        }
        h1 { margin: 10px 0; font-size: 1.5rem; }
        p { color: #666; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code">404</div>
    <h1>ページが見つかりません</h1>
    
    <div class="mc-msg">
        > /tp @s home<br>
        <span style="color: #ff5555;">[Error] ターゲットが見つかりません。</span><br>
        > チャンクの読み込みに失敗しました。
    </div>

    <p>
        どうやらこの場所は、まだ生成されていないチャンクのようです。<br>
        あるいは、誰かに /fill air されてしまったのかもしれません。
    </p>

    <a href="/" class="btn">初期スポーン地点へ戻る</a>
</div>

</body>
</html>
