<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高機能Webルーレット</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f4f4f4;
}

#wrapper {
  position: relative;
  width: 320px;
  margin: 20px auto;
}

canvas {
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 20px solid red;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 5px;
}

button {
  margin: 5px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<h2>🎡高機能Webルーレット</h2>

<div id="wrapper">
  <div id="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spin()">回す</button>
<button onclick="addItem()">＋追加</button>
<button onclick="update()">更新</button>

<table id="table">
<tr><th>名前</th><th>確率</th><th>削除</th></tr>
</table>

<script>
let items = [
  { name: "当たり", weight: 5 },
  { name: "ハズレ", weight: 20 },
  { name: "大当たり", weight: 2 }
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;

// テーブル描画
function renderTable() {
  const table = document.getElementById("table");

  table.innerHTML = `<tr><th>名前</th><th>確率</th><th>削除</th></tr>`;

  items.forEach((item, i) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td><input value="${item.name}" onchange="items[${i}].name=this.value"></td>
      <td><input type="number" value="${item.weight}" min="1"
        onchange="items[${i}].weight=parseInt(this.value)"></td>
      <td><button onclick="removeItem(${i})">❌</button></td>
    `;

    table.appendChild(row);
  });
}

// 削除
function removeItem(i) {
  items.splice(i, 1);
  renderTable();
  drawWheel();
}

// 追加
function addItem() {
  items.push({ name: "新しい項目", weight: 1 });
  renderTable();
  drawWheel();
}

// 更新
function update() {
  drawWheel();
}

// 重み抽選
function pickIndex() {
  let sum = items.reduce((a,b)=>a+b.weight,0);
  let r = Math.random()*sum;

  for (let i=0;i<items.length;i++){
    if (r < items[i].weight) return i;
    r -= items[i].weight;
  }
}

// 描画
function drawWheel() {
  const arc = (2*Math.PI)/items.length;
  ctx.clearRect(0,0,300,300);

  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.fillStyle = i%2? "#06d6a0":"#ffd166";

    ctx.moveTo(radius,radius);
    ctx.arc(radius,radius,radius,arc*i,arc*(i+1));
    ctx.fill();

    ctx.save();
    ctx.translate(radius,radius);
    ctx.rotate(arc*i+arc/2);
    ctx.fillStyle="#000";
    ctx.textAlign="right";
    ctx.fillText(items[i].name, radius-10,10);
    ctx.restore();
  }
}

// 回転
function spin(){
  const target = pickIndex();
  alert("結果：" + items[target].name);
}

renderTable();
drawWheel();
</script>

</body>
</html>
