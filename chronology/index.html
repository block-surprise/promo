<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細年表ポータルサイト - 各時代の詳細な年表</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
        }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 40px 0;
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            max-width: 900px;
            width: 95%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }
        /* 時代カードのスタイル */
        .era-link {
            text-decoration: none;
            color: var(--primary);
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .era-link:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .era-name {
            display: block;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .era-period {
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        h2 { color: white; margin: 0; font-size: 2rem; }
        p { color: rgba(255,255,255,0.8); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2>詳細年表ポータル</h2>
    <p>調べたい時代を選択してください</p>
</header>
