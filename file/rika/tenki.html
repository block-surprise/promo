<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>blockun - ダウンロードページ</title>
    <script>
        window.onload = function() {
            // ダウンロード設定
            const pdfUrl = 'https://promo.blocksurprise.f5.si/%E5%A4%A9%E6%B0%97%E3%80%80%E7%B7%B4%E7%BF%92%E5%95%8F%E9%A1%8C.pdf';
            const blogUrl = 'https://blockun.blogspot.com/2026/05/blog-post_22.html';

            // ダウンロードの実行
            const link = document.createElement('a');
            link.href = pdfUrl;
            
            // ファイル名を明示的に指定（拡張子がhtmlになるのを防ぐ）
            link.download = '天気_練習問題.pdf';
            
            // 別タブで開く挙動を組み合わせることで、強制的にファイル取得を促す
            link.target = '_blank'; 
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 3秒後に元のページへ移動
            setTimeout(function() {
                window.location.href = blogUrl;
            }, 3000); 
        };
    </script>
</head>
<body>
    <h2>blockun</h2>
    <p>ダウンロードを開始します。完了後、自動で元のページに戻ります。</p>
    <p>もし開始されない場合は、しばらくお待ちください。</p>
</body>
</html>
