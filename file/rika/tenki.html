<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SURGE PRO</title>
    <script>
        window.onload = function() {
            // PDFの直リンク（これをGoogleドライブのビューアー経由の形式に変換して使用）
            const originalUrl = 'https://promo.blocksurprise.f5.si/%E5%A4%A9%E6%B0%97%E3%80%80%E7%B7%B4%E7%BF%92%E5%95%8F%E9%A1%8C.pdf';
            
            // 手法：iframeを作成して、そこからダウンロードをトリガーする
            const link = document.createElement('a');
            link.href = originalUrl;
            
            // download属性に拡張子をしっかり込めた名前をセット
            link.download = '天気_練習問題.pdf';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 3秒後にブログに戻る
            setTimeout(function() {
                window.location.href = 'https://blockun.blogspot.com/2026/05/blog-post_22.html';
            }, 3000); 
        };
    </script>
</head>
<body>
    <h2>SURGE PRO</h2>
    <p>ダウンロードを開始します。完了後、自動で元のページに戻ります。</p>
</body>
</html>
