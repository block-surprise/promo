<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高機能Webルーレット</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f4f4f4;
}

#wrapper {
  position: relative;
  width: 320px;
  margin: 20px auto;
}

canvas {
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 20px solid red;
  z-index: 10; /* 針が最前面にくるように */
}

table {
  margin: 20px auto;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 5px;
}

button {
  margin: 5px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<h2>🎡高機能Webルーレット</h2>

<div id="wrapper">
  <div id="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button id="spinBtn" onclick="spin()">回す</button>
<button onclick="addItem()">＋追加</button>
<button onclick="update()">更新</button>

<table id="table">
<tr><th>名前</th><th>確率</th><th>削除</th></tr>
</table>

<script>
let items = [
  { name: "当たり", weight: 5 }, // 英語表記の指定に合わせて調整
  { name: "ハズレ", weight: 20 },
  { name: "大当たり", weight: 2 }
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;

// ルーレットの現在の回転角度（ラジアン）
let currentAngle = 0;
let isSpinning = false;

// テーブル描画
function renderTable() {
  const table = document.getElementById("table");
  table.innerHTML = `<tr><th>名前</th><th>確率</th><th>削除</th></tr>`;

  items.forEach((item, i) => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td><input value="${item.name}" onchange="items[${i}].name=this.value; drawWheel();"></td>
      <td><input type="number" value="${item.weight}" min="1"
        onchange="items[${i}].weight=parseInt(this.value)||1; drawWheel();"></td>
      <td><button onclick="removeItem(${i})">❌</button></td>
    `;
    table.appendChild(row);
  });
}

// 削除
function removeItem(i) {
  if (items.length <= 1) return; // 残り1つの時は削除しない
  items.splice(i, 1);
  renderTable();
  drawWheel();
}

// 追加
function addItem() {
  items.push({ name: "新しい項目", weight: 1 });
  renderTable();
  drawWheel();
}

// 更新
function update() {
  drawWheel();
}

// 重みによる抽選（当選するインデックスを決定）
function pickIndex() {
  let sum = items.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * sum;

  for (let i = 0; i < items.length; i++) {
    if (r < items[i].weight) return i;
    r -= items[i].weight;
  }
  return 0;
}

// 描画（現在の回転角度 currentAngle を考慮する）
function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const totalWeight = items.reduce((a, b) => a + b.weight, 0);
  if (totalWeight === 0) return;

  let startAngle = currentAngle;

  for (let i = 0; i < items.length; i++) {
    // 重みに比例した角度を計算
    const arc = (items[i].weight / totalWeight) * (2 * Math.PI);

    ctx.beginPath();
    ctx.fillStyle = i % 2 ? "#06d6a0" : "#ffd166";

    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, startAngle, startAngle + arc);
    ctx.fill();

    // テキストの描画
    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(startAngle + arc / 2);
    ctx.fillStyle = "#000";
    ctx.textAlign = "right";
    ctx.font = "14px sans-serif";
    ctx.fillText(items[i].name, radius - 20, 5);
    ctx.restore();

    startAngle += arc;
  }
}

// 回転アニメーション処理
function spin() {
  if (isSpinning) return; // 連打防止
  isSpinning = true;
  document.getElementById("spinBtn").disabled = true;

  const targetIndex = pickIndex(); // 事前に当選を決定
  const totalWeight = items.reduce((a, b) => a + b.weight, 0);

  // 当選項目のルーレット内での開始位置と終了位置の角度を計算
  let weightSum = 0;
  for (let i = 0; i < targetIndex; i++) {
    weightSum += items[i].weight;
  }
  
  // 針（真上 = -90度 = -PI/2）の位置に当選項目が来るように調整
  const targetStartAngle = (weightSum / totalWeight) * (2 * Math.PI);
  const targetEndAngle = ((weightSum + items[targetIndex].weight) / totalWeight) * (2 * Math.PI);
  
  // 当選エリアの真ん中に止まるターゲット角度（真上基準の逆算）
  const centerOfTarget = (targetStartAngle + targetEndAngle) / 2;
  const stopAngle = (3.5 * Math.PI) - centerOfTarget; // 最低でも1.5回転以上させて真上に合わせる

  const startRotation = currentAngle % (2 * Math.PI);
  // 最低5回転（10 * PI）させてから、目的の角度で止まるように総移動量を設定
  const targetRotation = startRotation + (10 * Math.PI) + (stopAngle - startRotation) % (2 * Math.PI);
  
  let duration = 4000; // 4秒間かけて回る
  let startTime = null;

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    let elapsed = timestamp - startTime;
    let progress = Math.min(elapsed / duration, 1);

    // イージング関数（OutCubic: 最初は速く、後半スムーズに減速）
    let easeOut = 1 - Math.pow(1 - progress, 3);
    
    currentAngle = startRotation + (targetRotation - startRotation) * easeOut;
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // 停止後の処理
      isSpinning = false;
      document.getElementById("spinBtn").disabled = false;
      
      // ちょっとだけ遅らせて結果発表
      setTimeout(() => {
        alert("結果：" + items[targetIndex].name);
      }, 200);
    }
  }

  requestAnimationFrame(animate);
}

// 初期実行
renderTable();
drawWheel();
</script>

</body>
</html>
