<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高機能Webあみだくじ</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 20px;
}

#container {
  display: inline-block;
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  margin-top: 10px;
}

/* メニューボタンの並び */
.menu-buttons {
  margin-bottom: 20px;
}

/* あみだくじ全体の横並びを制御 */
.amida-wrapper {
  display: flex;
  justify-content: center;
}

/* 縦列ごとのボックス（ボタン、名前、線、景品を縦に1本化） */
.amida-column {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 各パーツのサイズ固定（ズレ防止） */
.amida-column button {
  margin-bottom: 5px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
  width: 80px;
}

.amida-column input {
  width: 90px;
  text-align: center;
  padding: 4px;
  box-sizing: border-box;
}

.name-input {
  margin-bottom: 5px;
}

.goal-input {
  margin-top: 5px;
}

/* メニュー用の一般ボタン */
.btn-main {
  padding: 8px 15px;
  font-size: 14px;
  margin: 0 5px;
  cursor: pointer;
}

/* 線を描画するキャンバス（背景を透明にして重ねる） */
#stage {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none; /* 下にある入力欄の邪魔をしない */
}
</style>
</head>
<body>

<h2>🎋 高機能Webあみだくじ</h2>

<div id="container">
  <div class="menu-buttons">
    <button class="btn-main" onclick="addMember()">＋人数を増やす</button>
    <button class="btn-main" onclick="removeMember()">－人数を減らす</button>
    <button class="btn-main" onclick="initAmida()">くじを再生成</button>
  </div>

  <div style="position: relative; display: inline-block;">
    <div id="amidaGrid" class="amida-wrapper"></div>
    <canvas id="stage"></canvas>
  </div>
</div>

<script>
// 初期データ
let members = [
  { name: "プレイヤーA", goal: "当たり" },
  { name: "プレイヤーB", goal: "ハズレ" },
  { name: "プレイヤーC", goal: "ハズレ" },
  { name: "プレイヤーD", goal: "SURGE PRO" }
];

const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

let lines = []; 
const amidaRows = 15; 
const colWidth = 110; // 1列あたりの幅（ピクセル）
const amidaHeight = 300; // あみだの線の縦の長さ

let isAnimating = false;

// 画面のパーツを生成
function initInputs() {
  const grid = document.getElementById("amidaGrid");
  grid.innerHTML = "";

  members.forEach((m, i) => {
    const col = document.createElement("div");
    col.className = "amida-column";
    col.style.width = `${colWidth}px`;

    // スタートボタン
    const btn = document.createElement("button");
    btn.className = "spin-btn";
    btn.innerText = `スタート`;
    btn.onclick = () => startAmida(i);
    col.appendChild(btn);

    // 名前入力欄
    const nameInput = document.createElement("input");
    nameInput.className = "name-input";
    nameInput.value = m.name;
    nameInput.onchange = (e) => { members[i].name = e.target.value; };
    col.appendChild(nameInput);

    // 線が通るためのダミースペース（この裏にキャンバスの線が引かれます）
    const spacer = document.createElement("div");
    spacer.style.height = `${amidaHeight}px`;
    col.appendChild(spacer);

    // 景品入力欄
    const goalInput = document.createElement("input");
    goalInput.className = "goal-input";
    goalInput.value = m.goal;
    goalInput.onchange = (e) => { members[i].goal = e.target.value; };
    col.appendChild(goalInput);

    grid.appendChild(col);
  });

  // キャンバスのサイズを要素にぴったり合わせる
  canvas.width = colWidth * members.length;
  canvas.height = amidaHeight;
  
  // キャンバスの位置をダミースペースの高さに合わせる（スタートボタンと入力欄の直下）
  canvas.style.top = "65px"; // ボタンと名前入力欄の高さの合計
  canvas.style.left = "0px";
}

// あみだくじの線をランダム生成
function generateAmidaLines() {
  lines = [];
  for (let r = 0; r < amidaRows; r++) {
    lines[r] = new Array(members.length - 1).fill(false);
    for (let c = 0; c < members.length - 1; c++) {
      if (c === 0 || !lines[r][c - 1]) {
        lines[r][c] = Math.random() < 0.4;
      }
    }
  }
}

// あみだくじの基本形を描画
function drawBaseAmida() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  const rowHeight = canvas.height / (amidaRows + 1);

  // 縦線を描画
  for (let i = 0; i < members.length; i++) {
    const x = colWidth * i + colWidth / 2;
    ctx.beginPath();
    ctx.moveTo(x, rowHeight);
    ctx.lineTo(x, canvas.height - rowHeight);
    ctx.stroke();
  }

  // 横線を描画
  for (let r = 0; r < amidaRows; r++) {
    const y = rowHeight * (r + 1.5);
    for (let c = 0; c < members.length - 1; c++) {
      if (lines[r][c]) {
        const x1 = colWidth * c + colWidth / 2;
        const x2 = colWidth * (c + 1) + colWidth / 2;
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
      }
    }
  }
}

// 人数を増やす
function addMember() {
  if (isAnimating) return;
  members.push({ name: `プレイヤー${String.fromCharCode(65 + members.length)}`, goal: "ハズレ" });
  initAmida();
}

// 人数を減らす
function removeMember() {
  if (isAnimating || members.length <= 2) return;
  members.pop();
  initAmida();
}

// 再生成・リセット
function initAmida() {
  if (isAnimating) return;
  initInputs();
  generateAmidaLines();
  drawBaseAmida();
}

// あみだくじを辿るアニメーション
function startAmida(startIndex) {
  if (isAnimating) return;
  isAnimating = true;

  // すべてのボタンを一時的に無効化
  document.querySelectorAll("button").forEach(b => b.disabled = true);

  const rowHeight = canvas.height / (amidaRows + 1);

  let currentLine = startIndex;
  let currentY = rowHeight;
  
  let path = [{ x: colWidth * currentLine + colWidth / 2, y: currentY }];

  for (let r = 0; r < amidaRows; r++) {
    const nextY = rowHeight * (r + 1.5);
    
    if (currentLine > 0 && lines[r][currentLine - 1]) {
      path.push({ x: colWidth * currentLine + colWidth / 2, y: nextY });
      currentLine--;
      path.push({ x: colWidth * currentLine + colWidth / 2, y: nextY });
    } else if (currentLine < members.length - 1 && lines[r][currentLine]) {
      path.push({ x: colWidth * currentLine + colWidth / 2, y: nextY });
      currentLine++;
      path.push({ x: colWidth * currentLine + colWidth / 2, y: nextY });
    }
  }
  path.push({ x: colWidth * currentLine + colWidth / 2, y: canvas.height - rowHeight });

  let pathIndex = 0;
  let currentPos = { x: path[0].x, y: path[0].y };

  function animatePath() {
    if (pathIndex >= path.length - 1) {
      isAnimating = false;
      document.querySelectorAll("button").forEach(b => b.disabled = false);
      
      setTimeout(() => {
        alert(`${members[startIndex].name} の結果は 【 ${members[currentLine].goal} 】 です！`);
      }, 200);
      return;
    }

    const target = path[pathIndex + 1];
    const dx = target.x - currentPos.x;
    const dy = target.y - currentPos.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const speed = 6; 

    if (distance <= speed) {
      currentPos.x = target.x;
      currentPos.y = target.y;
      pathIndex++;
    } else {
      currentPos.x += (dx / distance) * speed;
      currentPos.y += (dy / distance) * speed;
    }

    drawBaseAmida();
    ctx.strokeStyle = "#ff4757";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    
    for (let i = 0; i <= pathIndex; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.lineTo(currentPos.x, currentPos.y);
    ctx.stroke();

    requestAnimationFrame(animatePath);
  }

  animatePath();
}

// 初回実行
initAmida();
</script>

</body>
</html>
