<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 今日の天気は？</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f7fafc;
  margin: 0;
  padding: 40px 20px;
  color: #2d3748;
}

.card {
  max-width: 400px;
  margin: 0 auto;
  background: white;
  padding: 30px 20px;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h1 {
  font-size: 22px;
  margin-top: 0;
  color: #4a5568;
}

.weather-box {
  margin: 25px 0;
  padding: 15px;
  background: #edf2f7;
  border-radius: 8px;
}

#weather-text {
  font-size: 18px;
  font-weight: bold;
  color: #1a202c;
  line-height: 1.6;
}

.temp-table {
  width: 100%;
  margin: 20px 0;
  border-collapse: collapse;
}

.temp-table td {
  padding: 10px;
  font-size: 16px;
  width: 50%;
}

.temp-val {
  font-size: 24px;
  font-weight: bold;
  margin-top: 5px;
}

.high-temp { color: #e53e3e; }
.low-temp { color: #3182ce; }

button {
  background: #4a5568;
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
}

button:hover {
  background: #2d3748;
}

button:disabled {
  background: #cbd5e0;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
  <h1>☀️ 今日の天気は？</h1>
  
  <div class="weather-box">
    <div id="weather-text">ボタンを押してね</div>
  </div>

  <table class="temp-table">
    <tr>
      <td>最高気温</td>
      <td>最低気温</td>
    </tr>
    <tr>
      <td id="high-val" class="high-temp temp-val">--</td>
      <td id="low-val" class="low-temp temp-val">--</td>
    </tr>
  </table>

  <button id="check-btn" onclick="getWeather()">天力をチェック</button>
</div>

<script>
async function getWeather() {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');
  const highVal = document.getElementById('high-val');
  const lowVal = document.getElementById('low-val');

  btn.disabled = true;
  weatherText.innerText = "取得中...";

  try {
    // 1. 天気予報データを取得（さいたま市が含まれる南部）
    const res = await fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/110000.json');
    const data = await res.json();

    // 今日の天気テキスト
    const todayWeather = data[0].timeSeries[0].areas[0].weathers[0];
    weatherText.innerText = todayWeather;

    // 2. 気温データを正確に取得
    // 配列の中から気温データ（timeSeries[2]）にアクセス
    const tempTimeSeries = data[0].timeSeries.find(s => s.areas[0].temps);
    
    if (tempTimeSeries) {
      const temps = tempTimeSeries.areas[0].temps;
      // 気象庁のデータ構成上、[0]が日中の最高（または最低）、[1]が次の気温になります
      // 今日・明日のデータから本日の予想気温をセットします
      highVal.innerText = temps[0] ? `${temps[0]}°C` : "--";
      lowVal.innerText = temps[1] ? `${temps[1]}°C` : "--";
    } else {
      highVal.innerText = "取得失敗";
      lowVal.innerText = "取得失敗";
    }

  } catch (error) {
    weatherText.innerText = "エラーが発生しました";
    highVal.innerText = "求敗";
    lowVal.innerText = "求敗";
    console.error(error);
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
