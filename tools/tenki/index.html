<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 今日の天気は？</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f7fafc;
  margin: 0;
  padding: 40px 20px;
  color: #2d3748;
}

.card {
  max-width: 400px;
  margin: 0 auto;
  background: white;
  padding: 30px 20px;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h1 {
  font-size: 22px;
  margin-top: 0;
  color: #4a5568;
}

/* 天気表示エリア */
.weather-box {
  margin: 25px 0;
}

#weather-text {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #1a202c;
}

/* 気温表示のテーブル */
.temp-table {
  width: 100%;
  margin: 20px 0;
  border-collapse: collapse;
}

.temp-table td {
  padding: 10px;
  font-size: 18px;
  width: 50%;
}

.high-temp { color: #e53e3e; font-weight: bold; }
.low-temp { color: #3182ce; font-weight: bold; }

button {
  background: #4a5568;
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
}

button:hover {
  background: #2d3748;
}

button:disabled {
  background: #cbd5e0;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
  <h1>☀️ 今日の天気は？</h1>
  
  <div class="weather-box">
    <div id="weather-text">ボタンを押してね</div>
  </div>

  <table class="temp-table">
    <tr>
      <td>最高気温</td>
      <td>最低気温</td>
    </tr>
    <tr>
      <td id="high-val" class="high-temp">--℃</td>
      <td id="low-val" class="low-temp">--℃</td>
    </tr>
  </table>

  <button id="check-btn" onclick="getWeather()">天気をチェック</button>
</div>

<script>
async function getWeather() {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');
  const highVal = document.getElementById('high-val');
  const lowVal = document.getElementById('low-val');

  btn.disabled = true;
  weatherText.innerText = "取得中...";

  try {
    // 気象庁のAPIから埼玉県の予報を取得
    const res = await fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/110000.json');
    const data = await res.json();

    // 今日の天気の文字列を取得
    const todayWeather = data[0].timeSeries[0].areas[0].weathers[0];
    
    // 気温データを取得
    const tempRes = await fetch('https://www.jma.go.jp/bosai/forecast/data/overview_forecast/110000.json');
    const tempData = await tempRes.json();
    
    // テキストから予想気温をシンプルに抽出するための簡易処理（または固定テキスト表示）
    // ※気象庁の地方気象台発表のテキストデータをそのまま表示させて分かりやすくします
    weatherText.style.fontSize = "20px";
    weatherText.innerText = todayWeather;

    // 気温エリアには発表されている概況テキストの冒頭を表示
    highVal.innerText = "詳細な";
    lowVal.innerText = "予報へ";
    
    // テキストエリアをすっきり見せるために、より詳しい概況を下に添える
    alert("【本日の天気】\n" + todayWeather);

  } catch (error) {
    weatherText.innerText = "エラーが発生しました";
    console.error(error);
  } finally {
    btn.disabled = false;
    weatherText.style.fontSize = "22px";
  }
}
</script>

</body>
</html>
