<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 今日の天気は？</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3571574988222927"
     crossorigin="anonymous"></script>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f7fafc;
  margin: 0;
  padding: 40px 20px;
  color: #2d3748;
}

.card {
  max-width: 400px;
  margin: 0 auto;
  background: white;
  padding: 30px 20px;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h1 {
  font-size: 22px;
  margin-top: 0;
  color: #4a5568;
}

.weather-box {
  margin: 25px 0;
  padding: 15px;
  background: #edf2f7;
  border-radius: 8px;
}

#weather-text {
  font-size: 16px;
  font-weight: bold;
  color: #1a202c;
  line-height: 1.6;
}

.temp-table {
  width: 100%;
  margin: 20px 0;
  border-collapse: collapse;
}

.temp-table td {
  padding: 10px;
  font-size: 16px;
  width: 50%;
}

.temp-val {
  font-size: 24px;
  font-weight: bold;
  margin-top: 5px;
}

.high-temp { color: #e53e3e; }
.low-temp { color: #3182ce; }

button {
  background: #4a5568;
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
}

button:hover {
  background: #2d3748;
}

button:disabled {
  background: #cbd5e0;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
  <h1>☀️ 今日の天気は？</h1>
  
  <div class="weather-box">
    <div id="weather-text">ボタンを押してね</div>
  </div>

  <table class="temp-table">
    <tr>
      <td>最高気温</td>
      <td>最低気温</td>
    </tr>
    <tr>
      <td id="high-val" class="high-temp temp-val">--</td>
      <td id="low-val" class="low-temp temp-val">--</td>
    </tr>
  </table>

  <button id="check-btn" onclick="getLocation()">現在地の天気をチェック</button>
</div>

<script>
// 1. GPSの位置情報を取得する
function getLocation() {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');

  if (!navigator.geolocation) {
    alert("お使いのブラウザは位置情報に対応していません");
    return;
  }

  btn.disabled = true;
  weatherText.innerText = "現在地を特定中...";

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      getWeather(lat, lon);
    },
    (error) => {
      btn.disabled = false;
      weatherText.innerText = "位置情報の取得に失敗しました。許可設定を確認してください。";
    }
  );
}

// 2. 緯度・経度を使って世界共通の天気API（Open-Meteo）からデータを取得
async function getWeather(lat, lon) {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');
  const highVal = document.getElementById('high-val');
  const lowVal = document.getElementById('low-val');

  weatherText.innerText = "天気予報データを取得中...";

  try {
    // Open-Meteo API（世界中の天気・気温・天気コードを1回で取れる）
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    const data = await res.json();

    // 今日の天気コードを取得して分かりやすい日本語に変換
    const code = data.daily.weather_code[0];
    const todayWeather = convertWeatherCode(code);
    
    // 文字列をキレイに整える処理（変な空白をリプレイス）
    // 気象庁ではないので基本キレイですが、念のため余計な連続スペースを1つにまとめて読みやすくします
    const cleanWeather = todayWeather.replace(/[\s　]+/g, ' ').trim();
    weatherText.innerText = cleanWeather;

    // 最高・最低気温をセット
    const maxTemp = data.daily.temperature_2m_max[0];
    const minTemp = data.daily.temperature_2m_min[0];
    
    highVal.innerText = maxTemp !== undefined ? `${Math.round(maxTemp)}°C` : "--";
    lowVal.innerText = minTemp !== undefined ? `${Math.round(minTemp)}°C` : "--";

  } catch (error) {
    weatherText.innerText = "エラーが発生しました";
    highVal.innerText = "失敗";
    lowVal.innerText = "失敗";
    console.error(error);
  } finally {
    btn.disabled = false;
  }
}

// WMO天気コードを綺麗で見やすい日本語テキストに変換する関数
function convertWeatherCode(code) {
  const codes = {
    0: "快晴（気持ちよく晴れます）",
    1: "晴れ（おおむね晴れ）", 2: "晴れ時々曇り", 3: "くもり",
    45: "霧が発生中", 48: "濃霧に注意",
    51: "弱い霧雨", 53: "霧雨", 55: "強い霧雨",
    61: "弱い雨", 63: "雨（しっかり降ります）", 65: "激しい大雨",
    71: "弱い雪", 73: "雪", 75: "大雪に注意",
    77: "地吹雪",
    80: "一時的な小雨", 81: "にわか雨", 82: "激しいにわか雨",
    85: "にわか雪", 86: "激しい雪",
    95: "雷雨（突風や雷に注意）", 96: "雷を伴う激しい雨", 99: "激しい雷雨・雹（ひょう）"
  };
  return codes[code] || "不明な天気（コード: " + code + "）";
}
</script>

</body>
</html>
