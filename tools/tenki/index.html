<script>
// 1. GPSの位置情報を取得する
function getLocation() {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');

  if (!navigator.geolocation) {
    alert("お使いのブラウザは位置情報に対応していません");
    return;
  }

  btn.disabled = true;
  weatherText.innerText = "現在地を特定中...";

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      getWeather(lat, lon);
    },
    (error) => {
      btn.disabled = false;
      weatherText.innerText = "位置情報の取得に失敗しました。許可設定を確認してください。";
    }
  );
}

// 2. 緯度・経度を使って世界共通の天気API（Open-Meteo）からデータを取得
async function getWeather(lat, lon) {
  const btn = document.getElementById('check-btn');
  const weatherText = document.getElementById('weather-text');
  const highVal = document.getElementById('high-val');
  const lowVal = document.getElementById('low-val');

  weatherText.innerText = "天気予報データを取得中...";

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    const data = await res.json();

    const code = data.daily.weather_code[0];
    const todayWeather = convertWeatherCode(code);
    
    const cleanWeather = todayWeather.replace(/[\s　]+/g, ' ').trim();
    weatherText.innerText = cleanWeather;

    const maxTemp = data.daily.temperature_2m_max[0];
    const minTemp = data.daily.temperature_2m_min[0];
    
    highVal.innerText = maxTemp !== undefined ? `${Math.round(maxTemp)}°C` : "--";
    lowVal.innerText = minTemp !== undefined ? `${Math.round(minTemp)}°C` : "--";

  } catch (error) {
    weatherText.innerText = "エラーが発生しました";
    highVal.innerText = "失敗";
    lowVal.innerText = "失敗";
    console.error(error);
  } finally {
    btn.disabled = false;
  }
}

function convertWeatherCode(code) {
  const codes = {
    0: "快晴（気持ちよく晴れます）",
    1: "晴れ（おおむね晴れ）", 2: "晴れ時々曇り", 3: "くもり",
    45: "霧が発生中", 48: "濃霧に注意",
    51: "弱い霧雨", 53: "霧雨", 55: "強い霧雨",
    61: "弱い雨", 63: "雨（しっかり降ります）", 65: "激しい大雨",
    71: "弱い雪", 73: "雪", 75: "大雪に注意",
    77: "地吹雪",
    80: "一時的な小雨", 81: "にわか雨", 82: "激しいにわか雨",
    85: "にわか雪", 86: "激しい雪",
    95: "雷雨（突風や雷に注意）", 96: "雷を伴う激しい雨", 99: "激しい雷雨・雹（ひょう）"
  };
  return codes[code] || "不明な天気（コード: " + code + "）";
}
