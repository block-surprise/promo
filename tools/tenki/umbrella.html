<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☔ 今日、傘いる？</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3571574988222927"
     crossorigin="anonymous"></script>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f4f8;
  margin: 0;
  padding: 40px 20px;
  color: #333;
}

.card {
  max-width: 400px;
  margin: 0 auto;
  background: white;
  padding: 30px 20px;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

h1 {
  font-size: 24px;
  margin-top: 0;
  color: #4a5568;
}

#result-icon {
  font-size: 72px;
  margin: 20px 0;
}

#result-text {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 10px;
}

#result-detail {
  font-size: 14px;
  color: #718096;
  margin-bottom: 25px;
  line-height: 1.5;
  white-space: pre-wrap;
}

button {
  background: #3182ce;
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
}

button:hover {
  background: #2b6cb0;
}

button:disabled {
  background: #cbd5e0;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
  <h1>☔ 今日、傘いる？</h1>
  
  <div id="result-icon">🤔</div>
  <div id="result-text">ボタンを押してね</div>
  <div id="result-detail">GPSで現在地の降水確率をチェックします</div>

  <button id="check-btn" onclick="getLocation()">現在地を調べて判定</button>
  <a id="detail-link-btn" href="https://promo.blocksurprise.f5.si/tools/tenki/" target="_blank">🔍 詳しい天気を知る</a>
</div>

<script>
// 1. まずブラウザのGPS機能（Geolocation API）を呼び出す
function getLocation() {
  const btn = document.getElementById('check-btn');
  const icon = document.getElementById('result-icon');
  const text = document.getElementById('result-text');
  const detail = document.getElementById('result-detail');

  if (!navigator.geolocation) {
    alert("お使いのブラウザはGPSに対応していません");
    return;
  }

  btn.disabled = true;
  text.innerText = "位置情報を取得中...";
  icon.innerText = "📍";

  // 位置情報の取得を開始
  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;  // 緯度
      const lon = position.coords.longitude; // 経度
      
      // 位置情報が取れたら天気データを取得しにいく
      checkWeather(lat, lon);
    },
    (error) => {
      btn.disabled = false;
      icon.innerText = "❌";
      text.innerText = "位置情報エラー";
      detail.innerText = "位置情報の許可をしてから\nもう一度試してみてね。";
    }
  );
}

// 2. 緯度・経度を使って無料の天気API（Open-Meteo）からデータを取得
async function checkWeather(lat, lon) {
  const btn = document.getElementById('check-btn');
  const icon = document.getElementById('result-icon');
  const text = document.getElementById('result-text');
  const detail = document.getElementById('result-detail');

  text.innerText = "天気を取得中...";
  icon.innerText = "☁️";

  try {
    // 世界中で使える無料の天気API「Open-Meteo」を利用（緯度経度をそのまま渡せる）
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=precipitation_probability_max&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    const data = await res.json();

    // 今日の最高降水確率を取得
    const maxPop = data.daily.precipitation_probability_max[0];

    // 傘が必要か判定
    if (maxPop >= 30) {
      icon.innerText = "☔";
      text.innerText = "傘、いる！";
      text.style.color = "#e53e3e";
      detail.innerText = `現在地周辺の今日の降水確率は ${maxPop}% です。\n折りたたみ傘などがあると安心！`;
    } else {
      icon.innerText = "☀️";
      text.innerText = "傘、いらない！";
      text.style.color = "#3182ce";
      detail.innerText = `現在地周辺の今日の降水確率は ${maxPop}% です。\n安心して手ぶらでお出かけしてください。`;
    }

  } catch (error) {
    icon.innerText = "❌";
    text.innerText = "エラー";
    detail.innerText = "天気データの取得に失敗しました。";
    console.error(error);
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
