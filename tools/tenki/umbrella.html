<script>
// （JavaScriptの処理は変更ないため省略しません。そのまま動作します）
function getLocation() {
  const btn = document.getElementById('check-btn');
  const icon = document.getElementById('result-icon');
  const text = document.getElementById('result-text');
  const detail = document.getElementById('result-detail');

  if (!navigator.geolocation) {
    alert("お使いのブラウザはGPSに対応していません");
    return;
  }

  btn.disabled = true;
  text.innerText = "位置情報を取得中...";
  icon.innerText = "📍";

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      checkWeather(lat, lon);
    },
    (error) => {
      btn.disabled = false;
      icon.innerText = "❌";
      text.innerText = "位置情報エラー";
      detail.innerText = "位置情報の許可をしてから\nもう一度試してみてね。";
    }
  );
}

async function checkWeather(lat, lon) {
  const btn = document.getElementById('check-btn');
  const icon = document.getElementById('result-icon');
  const text = document.getElementById('result-text');
  const detail = document.getElementById('result-detail');

  text.innerText = "天気を取得中...";
  icon.innerText = "☁️";

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=precipitation_probability_max&timezone=Asia%2FTokyo`;
    const res = await fetch(url);
    const data = await res.json();

    const maxPop = data.daily.precipitation_probability_max[0];

    if (maxPop >= 30) {
      icon.innerText = "☔";
      text.innerText = "傘、いる！";
      text.style.color = "#e53e3e";
      detail.innerText = `現在地周辺の今日の降水確率は ${maxPop}% です。\n折りたたみ傘などがあると安心！`;
    } else {
      icon.innerText = "☀️";
      text.innerText = "傘、いらない！";
      text.style.color = "#3182ce";
      detail.innerText = `現在地周辺の今日の降水確率は ${maxPop}% です。\n安心して手ぶらでお出かけしてください。`;
    }

  } catch (error) {
    icon.innerText = "❌";
    text.innerText = "エラー";
    detail.innerText = "天気データの取得に失敗しました。";
    console.error(error);
  } finally {
    btn.disabled = false;
  }
}
</script>
