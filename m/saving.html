<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>貯金シミュレーター | おかねノート</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#f5f7fa;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
background:#3498db;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#eef7ff;
border-radius:10px;
}

.progress{
height:25px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#27ae60;
transition:.5s;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
}
nav{
background:white;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

nav ul{
display:flex;
justify-content:center;
gap:20px;
list-style:none;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:#2c3e50;
font-weight:bold;
}
</style>
</head>
<body>
<nav>
<ul>

<li>
<a href="saving.html">
貯金
</a>
</li>

<li>
<a href="parttime.html">
バイト
</a>
</li>

<li>
<a href="invest.html">
投資
</a>
</li>

<li>
<a href="subscription.html">
サブスク
</a>
</li>

<li>
<a href="expense.html">
支出分析
</a>
</li>

</ul>
</nav>
<div class="container">

<h1>💰 貯金シミュレーター</h1>

<input
type="number"
id="goal"
placeholder="目標金額">

<input
type="number"
id="current"
placeholder="現在の貯金">

<input
type="number"
id="monthly"
placeholder="毎月の貯金額">

<button onclick="calculate()">
計算する
</button>

<div
class="result"
id="result"
style="display:none">

<h2>結果</h2>

<p id="months"></p>
<p id="date"></p>
<p id="rate"></p>

<div class="progress">
<div
class="bar"
id="bar">
</div>
</div>

</div>

<a
class="back"
href="index.html">
← トップへ戻る
</a>

</div>

<script>

window.onload=()=>{

goal.value=
localStorage.getItem("goal")||"";

current.value=
localStorage.getItem("current")||"";

monthly.value=
localStorage.getItem("monthly")||"";

}

function calculate(){

const goalValue=
Number(goal.value);

const currentValue=
Number(current.value);

const monthlyValue=
Number(monthly.value);

if(
goalValue<=0||
monthlyValue<=0
){
alert("正しい数値を入力してください");
return;
}

localStorage.setItem(
"goal",
goalValue
);

localStorage.setItem(
"current",
currentValue
);

localStorage.setItem(
"monthly",
monthlyValue
);

const remain=
goalValue-currentValue;

const months=
Math.max(
0,
Math.ceil(remain/monthlyValue)
);

const targetDate=
new Date();

targetDate.setMonth(
targetDate.getMonth()+months
);

const percent=
Math.min(
100,
Math.round(
(currentValue/goalValue)*100
)
);

result.style.display="block";

document.getElementById("months")
.innerHTML=
`達成まで：約 ${months} ヶ月`;

document.getElementById("date")
.innerHTML=
`達成予定日：
${targetDate.getFullYear()}年
${targetDate.getMonth()+1}月`;

document.getElementById("rate")
.innerHTML=
`達成率：${percent}%`;

document.getElementById("bar")
.style.width=
percent+"%";

}

</script>

</body>
</html>
