<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>サブスク管理 | おかねノート</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#f5f7fa;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add-btn{
width:100%;
background:#3498db;
color:white;
}

.delete-btn{
background:#e74c3c;
color:white;
padding:8px 12px;
}

.card{
background:#eef7ff;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

.summary{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
}
.navbar{
background:#2c3e50;
padding:15px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
padding:8px 12px;
border-radius:8px;
transition:.2s;
}

.navbar a:hover{
background:rgba(255,255,255,.15);
}
</style>
</head>
<body>
<nav class="navbar">

<a href="index.html">🏠 ホーム</a>

<a href="saving.html">💰 貯金</a>

<a href="parttime.html">💵 バイト</a>

<a href="invest.html">📈 投資</a>

<a href="subscription.html">🎬 サブスク</a>

<a href="expense.html">📊 支出分析</a>

</nav>
<div class="container">

<h1>🎬 サブスク管理</h1>

<input
type="text"
id="name"
placeholder="サービス名">

<input
type="number"
id="price"
placeholder="月額料金">

<button
class="add-btn"
onclick="addSubscription()">
追加する
</button>

<div
id="list"
class="card">
</div>

<div
class="summary"
id="summary">
月額合計：0円<br>
年額合計：0円
</div>

<a
class="back"
href="index.html">
← トップへ戻る
</a>

</div>

<script>

let subscriptions =
JSON.parse(
localStorage.getItem("subscriptions")
) || [];

render();

function addSubscription(){

const name =
document.getElementById("name").value.trim();

const price =
Number(
document.getElementById("price").value
);

if(!name || price <= 0){
alert("正しく入力してください");
return;
}

subscriptions.push({
name,
price
});

save();
render();

name.value="";
price.value="";

document.getElementById("name").value="";
document.getElementById("price").value="";

}

function deleteSubscription(index){

subscriptions.splice(index,1);

save();
render();

}

function save(){

localStorage.setItem(
"subscriptions",
JSON.stringify(subscriptions)
);

}

function render(){

const list =
document.getElementById("list");

list.innerHTML="";

let monthlyTotal=0;

subscriptions.forEach((sub,index)=>{

monthlyTotal += sub.price;

list.innerHTML += `
<div class="item">
<div>
<strong>${sub.name}</strong><br>
${sub.price.toLocaleString()}円/月
</div>

<button
class="delete-btn"
onclick="deleteSubscription(${index})">
削除
</button>
</div>
`;

});

const yearlyTotal =
monthlyTotal * 12;

document.getElementById("summary")
.innerHTML = `
月額合計：
${monthlyTotal.toLocaleString()}円<br>

年額合計：
${yearlyTotal.toLocaleString()}円
`;

}

</script>

</body>
</html>
