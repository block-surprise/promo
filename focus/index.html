<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOCUS SPACE | Minimal Ambient Mixer</title>
    <style>
        :root {
            --bg-color: #020617;
            --panel-bg: rgba(30, 41, 59, 0.5);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 背景の動く光（エフェクト） */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 0.2rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            letter-spacing: 0.1rem;
        }

        /* ミキサー部分 */
        .mixer {
            display: grid;
            gap: 24px;
        }

        .sound-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, border-color 0.3s;
        }

        .sound-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* スライダーのカスタムデザイン */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--text-main);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.2);
            background: var(--accent);
        }

        .controls {
            margin-top: 50px;
        }

        .btn-stop {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--text-dim);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.1rem;
        }

        .btn-stop:hover {
            color: white;
            border-color: white;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="container">
    <h1>Focus Space</h1>
    <div class="subtitle">Customize your silence</div>

    <div class="mixer">
        <div class="sound-card">
            <div class="card-header"><span>Rain</span><span class="vol-label">0%</span></div>
            <input type="range" min="0" max="1" step="0.01" value="0" oninput="updateVol('rain', this)">
        </div>

        <div class="sound-card">
            <div class="card-header"><span>Forest</span><span class="vol-label">0%</span></div>
            <input type="range" min="0" max="1" step="0.01" value="0" oninput="updateVol('forest', this)">
        </div>

        <div class="sound-card">
            <div class="card-header"><span>Coffee Shop</span><span class="vol-label">0%</span></div>
            <input type="range" min="0" max="1" step="0.01" value="0" oninput="updateVol('cafe', this)">
        </div>

        <div class="sound-card">
            <div class="card-header"><span>White Noise</span><span class="vol-label">0%</span></div>
            <input type="range" min="0" max="1" step="0.01" value="0" oninput="updateVol('white', this)">
        </div>
    </div>

    <div class="controls">
        <button class="btn-stop" onclick="stopAll()">ALL STOP</button>
    </div>
</div>

<script>
    // サンプル音源（後で本番用に差し替えてください）
    const sounds = {
        rain: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'),
        forest: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'),
        cafe: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'),
        white: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3')
    };

    Object.values(sounds).forEach(s => s.loop = true);

    function updateVol(type, el) {
        const vol = el.value;
        const audio = sounds[type];
        const label = el.previousElementSibling.querySelector('.vol-label');
        
        label.innerText = Math.round(vol * 100) + "%";

        if (vol > 0) {
            if (audio.paused) audio.play().catch(() => {});
            audio.volume = vol;
        } else {
            audio.pause();
        }
    }

    function stopAll() {
        Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
        document.querySelectorAll('input[type="range"]').forEach(s => s.value = 0);
        document.querySelectorAll('.vol-label').forEach(l => l.innerText = "0%");
    }
</script>

</body>
</html>
