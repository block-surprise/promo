<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Space | Minimal Mixer</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #007aff; /* iOS風のブルー */
            --text: #1d1d1f;
        }

        body {
            font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 60px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
        }

        /* 選択された音源が並ぶエリア */
        #active-mixer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
            min-height: 200px;
            width: 90%;
            max-width: 800px;
        }

        /* 音量調整の丸いパネル */
        .mixer-circle {
            background: var(--card-bg);
            width: 140px;
            height: 180px;
            border-radius: 70px; /* カプセル型 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-sizing: border-box;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: #f2f2f7;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 15px;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff3b30;
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* 縦向きのスライダー */
        .volume-slider {
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 60px;
            accent-color: var(--accent);
        }

        /* 音源選択リスト */
        .library {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 30px;
            padding: 15px 30px;
            border-radius: 40px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .lib-item {
            cursor: pointer;
            font-size: 1.2rem;
            color: #8e8e93;
            transition: 0.2s;
        }

        .lib-item:hover {
            color: var(--accent);
            transform: translateY(-5px);
        }

        .lib-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            transition: 0.2s;
        }

        .lib-item:hover .lib-label { opacity: 1; }
    </style>
</head>
<body>

<header>
    <h1>Focus Space</h1>
</header>

<!-- 再生中の音源が出る場所 -->
<div id="active-mixer"></div>

<!-- 音源ライブラリ -->
<div class="library" id="library">
    <div class="lib-item" onclick="addSound('rain', 'fa-cloud-showers-heavy')">
        <i class="fa-solid fa-cloud-showers-heavy"></i>
        <span class="lib-label">Rain</span>
    </div>
    <div class="lib-item" onclick="addSound('fire', 'fa-fire')">
        <i class="fa-solid fa-fire"></i>
        <span class="lib-label">Fire</span>
    </div>
    <div class="lib-item" onclick="addSound('cafe', 'fa-mug-hot')">
        <i class="fa-solid fa-mug-hot"></i>
        <span class="lib-label">Cafe</span>
    </div>
    <div class="lib-item" onclick="addSound('wind', 'fa-wind')">
        <i class="fa-solid fa-wind"></i>
        <span class="lib-label">Wind</span>
    </div>
    <div class="lib-item" onclick="addSound('forest', 'fa-tree')">
        <i class="fa-solid fa-tree"></i>
        <span class="lib-label">Forest</span>
    </div>
    <div class="lib-item" onclick="addSound('wave', 'fa-water')">
        <i class="fa-solid fa-water"></i>
        <span class="lib-label">Wave</span>
    </div>
</div>

<script>
    // 音源データ
    const audioData = {
        rain: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
        fire: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
        cafe: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
        wind: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
        forest: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3',
        wave: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3'
    };

    const activeSounds = {}; // 再生中のAudioオブジェクトを管理

    function addSound(id, iconClass) {
        if (activeSounds[id]) return; // 既に追加されていれば何もしない

        // Audioの作成
        const audio = new Audio(audioData[id]);
        audio.loop = true;
        activeSounds[id] = audio;

        // UIの作成
        const mixerArea = document.getElementById('active-mixer');
        const card = document.createElement('div');
        card.className = 'mixer-circle';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div class="icon-box">
                <i class="fa-solid ${iconClass}"></i>
                <button class="remove-btn" onclick="removeSound('${id}')">×</button>
            </div>
            <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0" 
                   oninput="changeVol('${id}', this.value)">
        `;
        mixerArea.appendChild(card);
    }

    function changeVol(id, vol) {
        const audio = activeSounds[id];
        if (vol > 0) {
            if (audio.paused) audio.play();
            audio.volume = vol;
        } else {
            audio.pause();
        }
    }

    function removeSound(id) {
        activeSounds[id].pause();
        delete activeSounds[id];
        const card = document.getElementById(`card-${id}`);
        card.style.transform = "scale(0.5)";
        card.style.opacity = "0";
        setTimeout(() => card.remove(), 300);
    }
</script>

</body>
</html>
